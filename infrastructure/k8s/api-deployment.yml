apiVersion: apps/v1
kind: Deployment
metadata:
  name: shadowsig-api
  labels:
    app: shadowsig-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shadowsig-api
  template:
    metadata:
      labels:
        app: shadowsig-api
    spec:
      containers:
        - name: api
          image: shadowsig-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shadowsig-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shadowsig-secrets
                  key: redis-url
            - name: RUST_LOG
              value: "shadowsig=info"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shadowsig-api
spec:
  selector:
    app: shadowsig-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shadowsig-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shadowsig-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
